services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_compat_data:/var/lib/postgresql/data

volumes:
  postgres_compat_data:
