gradient_clip_enabled: true
gradient_clip_max_norm: 1.0
lr_decay_factor: 0.5
lr_decay_epochs: 10
min_lr: 0.000001
require_duckdb: false
generate_runpod_spec: false
model_version: phase7_v1
