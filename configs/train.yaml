model_name: ridge_return
dataset_path: data/lake/datasets/dataset=spy_rolling/version=phase6_v1/window_id=0
target_column: close
feature_columns:
  - open
  - high
  - low
  - volume
output_root: data/lake/models
epochs: 1
learning_rate: 0.001
batch_size: 32
seed: 42
device: auto
early_stopping_patience: 10
