name: pipeline_gpu_runpod
pipeline:
  name: pipeline_gpu_runpod
  tasks:
    - ingest_raw
    - preprocess
    - extract_features
    - build_sliding_windows
    - train_baselines
    - train_neural_optional
    - predict
    - evaluate
    - backtest
    - risk_report
    - aggregate_report
retries:
  max_attempts: 2
  backoff_seconds: 0
cost_guard:
  max_cost_per_job_usd: 2.00
  max_daily_cost_usd: 5.00
  require_confirmation_for_paid_jobs: true
  dry_run_default: true
compute:
  provider: runpod
  dry_run: true
  max_job_minutes: 60
  idle_timeout_seconds: 300
  max_hourly_cost_usd: 0.50
  prefer_spot: true
cost_estimate:
  estimated_cost_usd: 0.50
  currency: USD
  provider: runpod
efficiency_gates:
  max_pipeline_minutes_local: 30
  max_peak_memory_mb: 4096
  min_rows_per_second: 10000
  max_gpu_job_minutes: 60
  max_cost_per_run_usd: 2.00
task_configs:
  ingest_raw:
    source: sample
    source_type: market
    symbols:
      - SPY
      - QQQ
    asset_type: equity
    timeframe: 1d
    start: "2024-01-01"
    periods: 30
  preprocess:
    bronze_path: bronze/market_bars/part-000.parquet
    silver_path: silver/market_bars/part-000.parquet
    quality_report_path: silver/market_bars/_quality_report.json
    require_duckdb: false
  features:
    version: mvp_v1
    universe:
      - SPY
      - QQQ
    groups:
      - price_volume
      - regime
      - risk
    require_duckdb: false
  windows:
    dataset_name: spy_rolling
    version: mvp_v1
    input_path: data/lake/silver/market_bars
    output_root: data/lake/datasets
    require_duckdb: false
    sliding_window:
      mode: rolling
      train_size_days: 730
      validation_size_days: 90
      test_size_days: 90
      step_size_days: 30
      embargo_days: 5
      horizon_days: 5
      purge_overlap: true
      min_samples_per_window: 1000
  train:
    model_name: ridge_return
    model_version: mvp_v1
    dataset_path: data/lake/datasets/dataset=spy_rolling/version=mvp_v1/window_id=0
    target_column: close
    output_root: data/lake/models
    device: cpu
    require_duckdb: false
    generate_runpod_spec: false
  train_neural:
    enabled: true
    model_name: fin_mamba
    model_version: runpod_mvp_v1
    training_mode: windowed
    dataset_uri: s3://example-bucket/data/lake/datasets/dataset=spy_rolling/version=mvp_v1
    output_uri: s3://example-bucket/data/lake/models/fin_mamba/runpod
    logs_uri: s3://example-bucket/data/lake/logs/runpod/fin_mamba
    metrics_uri: s3://example-bucket/data/lake/metrics/runpod/fin_mamba
    config_path: configs/train_gpu_runpod.yaml
    target_column: close
    epochs: 10
    batch_size: 64
    device: cuda
    max_runtime_seconds: 3600
    idle_timeout_seconds: 300
    dataset_size_gb: 1.0
    hourly_cost_usd: 0.50
    runpod_gpu_type: NVIDIA RTX A4000
    runpod_image: ghcr.io/pedroramos17/data-analysis:latest
    generate_runpod_spec: true
  evaluation:
    name: evaluate_mvp
    model_name: ridge_return
    model_version: mvp_v1
    dataset_name: spy_rolling
    dataset_version: mvp_v1
    dataset_path: data/lake/datasets
    target_column: close
    require_duckdb: false
  backtest:
    name: backtest_mvp
    predictions_path: data/lake/predictions/model=ridge_return/version=mvp_v1/window_id=0/predictions.parquet
    target_column: close
    require_duckdb: false
  risk:
    enabled: true
  mvp_demo:
    enabled: false
