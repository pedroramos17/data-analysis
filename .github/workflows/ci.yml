name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "feature/**"

jobs:
  django:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Test monitoring app
        run: python manage.py test monitoring.tests

      - name: Compute profile smoke check
        run: python manage.py inspect_compute --profile local_cpu_low

      - name: Dashboard template smoke check
        run: >
          python manage.py create_dashboard_jobs
          --template local_simple_pipeline
          --profile local_cpu_low
          --dry-run
