<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sourceflow{% endblock %}</title>
  <style>
    :root { --fg:#1b1f24; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; --bg:#f8fafc; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; color:var(--fg); background:#fff; }
    header { background:var(--bg); border-bottom:1px solid var(--line); padding:.6rem 1rem; }
    header h1 { font-size:1rem; margin:0 0 .35rem; }
    nav a { color:var(--accent); text-decoration:none; margin-right:.8rem; font-size:.85rem; white-space:nowrap; }
    nav a:hover { text-decoration:underline; }
    main { padding:1rem 1.2rem; max-width:1100px; }
    h2 { font-size:1.15rem; margin:.2rem 0 .8rem; }
    table { border-collapse:collapse; width:100%; margin:.4rem 0 1rem; }
    th,td { text-align:left; padding:.35rem .5rem; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:600; font-size:.78rem; text-transform:uppercase; letter-spacing:.02em; }
    .muted { color:var(--muted); }
    .pill { display:inline-block; padding:.05rem .45rem; border-radius:999px; background:var(--bg); border:1px solid var(--line); font-size:.75rem; }
    .pos { color:#047857; } .neg { color:#b91c1c; }
    .card { border:1px solid var(--line); border-radius:8px; padding:.8rem 1rem; margin:.6rem 0; }
    form.inline { margin:.4rem 0 1rem; }
    input[type=text],select { padding:.35rem .5rem; border:1px solid var(--line); border-radius:6px; font:inherit; }
    button { padding:.35rem .8rem; border:1px solid var(--accent); background:var(--accent); color:#fff; border-radius:6px; cursor:pointer; }
    code { background:var(--bg); padding:.05rem .3rem; border-radius:4px; }
    .empty { color:var(--muted); font-style:italic; }
  </style>
</head>
<body>
  <header>
    <h1>Sourceflow — Agentic Knowledge Reasoning</h1>
    <nav>
      <a href="{% url 'sourceflow_ui:index' %}">Home</a>
      <a href="{% url 'sourceflow_ui:documents' %}">Documents</a>
      <a href="{% url 'sourceflow_ui:entities' %}">Entities</a>
      <a href="{% url 'sourceflow_ui:claims' %}">Claims</a>
      <a href="{% url 'sourceflow_ui:event-clusters' %}">Events</a>
      <a href="{% url 'sourceflow_ui:source-comparison' %}">Source comparison</a>
      <a href="{% url 'sourceflow_ui:kg-path' %}">KG paths</a>
      <a href="{% url 'sourceflow_ui:beliefs' %}">Beliefs</a>
      <a href="{% url 'sourceflow_ui:graphrag' %}">GraphRAG</a>
      <a href="{% url 'sourceflow_ui:risk' %}">Risk</a>
      <a href="{% url 'sourceflow_ui:portfolio' %}">Portfolio</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
