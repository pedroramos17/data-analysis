<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Public Source Monitor{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --border: #d7dee8;
      --ink: #17202a;
      --muted: #5d6978;
      --surface: #f6f8fb;
      --panel: #ffffff;
      --accent: #1f6feb;
      --success: #17803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }
    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav {
      display: flex;
      gap: 18px;
      align-items: center;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 20px;
    }
    nav strong { margin-right: auto; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 48px;
    }
    form.filters {
      display: grid;
      grid-template-columns: minmax(180px, 2fr) repeat(3, minmax(120px, 1fr)) auto;
      gap: 10px;
      margin: 0 0 18px;
    }
    input, select, button {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
    }
    button {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      cursor: pointer;
    }
    button.secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--border);
    }
    textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px;
      font: inherit;
      resize: vertical;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin: 18px 0;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
    }
    .panel h2, .panel h3 { margin-top: 0; }
    .stat {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
    }
    .messages {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    .message {
      padding: 10px 12px;
      border: 1px solid #b7dfc5;
      border-radius: 6px;
      color: var(--success);
      background: #f0fbf3;
    }
    .message.error {
      border-color: #f2b8b5;
      color: #b42318;
      background: #fff4f2;
    }
    pre {
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f8fafc;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .table-scroll {
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .table-scroll table th {
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }
    .table-scroll table td {
      max-width: 320px;
      overflow-wrap: anywhere;
    }
    .muted { color: var(--muted); }
    .pill {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
    }
    .pagination {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }
    @media (max-width: 760px) {
      nav, form.filters { display: block; }
      nav a { display: inline-block; margin: 8px 14px 0 0; }
      form.filters > * { width: 100%; margin-bottom: 8px; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <strong><a href="{% url 'monitoring:dashboard' %}">Public Source Monitor</a></strong>
      <a href="{% url 'monitoring:document-list' %}">Documents</a>
      <a href="{% url 'monitoring:feed-digest' %}">Digest</a>
      <a href="{% url 'monitoring:alert-hit-list' %}">Alerts</a>
      <a href="{% url 'monitoring:topic-cluster-list' %}">Topics</a>
      <a href="{% url 'monitoring:source-list' %}">Sources</a>
      <a href="{% url 'monitoring:intelligence-dashboard' %}">Intelligence</a>
      <a href="{% url 'monitoring:discovery-candidate-list' %}">Candidates</a>
      <a href="{% url 'monitoring:dead-letter-list' %}">Failures</a>
      <a href="{% url 'monitoring:export-artifact-list' %}">Exports</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <main>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
