<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Public Source Monitor{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --border: #d7dee8;
      --ink: #17202a;
      --muted: #5d6978;
      --surface: #f6f8fb;
      --panel: #ffffff;
      --accent: #1f6feb;
      --success: #17803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }
    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav {
      display: flex;
      gap: 18px;
      align-items: center;
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 20px;
    }
    nav strong { margin-right: auto; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 48px;
    }
    form.filters {
      display: grid;
      grid-template-columns: minmax(180px, 2fr) repeat(3, minmax(120px, 1fr)) auto;
      gap: 10px;
      margin: 0 0 18px;
    }
    input, select, button {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
    }
    button {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      cursor: pointer;
    }
    button.secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--border);
    }
    textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px;
      font: inherit;
      resize: vertical;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin: 18px 0;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
    }
    .panel h2, .panel h3 { margin-top: 0; }
    .stat {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
    }
    .field-stack {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    .field-label {
      display: flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .tooltip {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--muted);
      background: var(--surface);
      cursor: help;
      font-size: 12px;
      text-transform: none;
    }
    .tooltip-text {
      position: absolute;
      left: 0;
      top: 24px;
      z-index: 5;
      display: none;
      width: min(260px, 70vw);
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink);
      background: var(--panel);
      box-shadow: 0 8px 20px rgb(23 32 42 / 12%);
      font-size: 12px;
      font-weight: 400;
      text-transform: none;
    }
    .tooltip:hover .tooltip-text,
    .tooltip:focus .tooltip-text {
      display: block;
    }
    .messages {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    .message {
      padding: 10px 12px;
      border: 1px solid #b7dfc5;
      border-radius: 6px;
      color: var(--success);
      background: #f0fbf3;
    }
    pre {
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f8fafc;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .table-scroll {
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .table-scroll table th {
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }
    .table-scroll table td {
      max-width: 320px;
      overflow-wrap: anywhere;
    }
    .data-table-shell {
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--border);
      border-radius: 6px;
      resize: horizontal;
      min-width: min(100%, 320px);
      max-width: 100%;
    }
    .data-table {
      min-width: max-content;
      table-layout: fixed;
    }
    .data-table th {
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
      white-space: nowrap;
    }
    .data-table td {
      min-width: 110px;
      max-width: 420px;
      overflow-wrap: anywhere;
    }
    .data-table-caption {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface);
    }
    .column-resizer {
      float: right;
      width: 8px;
      min-height: 22px;
      margin: -3px -5px -3px 8px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      cursor: col-resize;
    }
    .column-resizer::after {
      content: "";
      display: block;
      width: 1px;
      height: 18px;
      margin: 2px auto;
      background: var(--border);
    }
    .muted { color: var(--muted); }
    .pill {
      display: inline-block;
      margin: 0 4px 4px 0;
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
    }
    .pagination {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }
    @media (max-width: 760px) {
      nav, form.filters { display: block; }
      nav a { display: inline-block; margin: 8px 14px 0 0; }
      form.filters > * { width: 100%; margin-bottom: 8px; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <strong><a href="{% url 'monitoring:dashboard' %}">Public Source Monitor</a></strong>
      <a href="{% url 'monitoring:control-dashboard' %}">Control</a>
      <a href="{% url 'monitoring:document-list' %}">Documents</a>
      <a href="{% url 'monitoring:feed-digest' %}">Digest</a>
      <a href="{% url 'monitoring:alert-hit-list' %}">Alerts</a>
      <a href="{% url 'monitoring:topic-cluster-list' %}">Topics</a>
      <a href="{% url 'monitoring:source-list' %}">Sources</a>
      <a href="{% url 'monitoring:discovery-candidate-list' %}">Candidates</a>
      <a href="{% url 'monitoring:dead-letter-list' %}">Failures</a>
      <a href="{% url 'monitoring:export-artifact-list' %}">Exports</a>
      <a href="{% url 'monitoring:control-jobs' %}">Jobs</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <main>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script>
    function initializeDashboardTables() {
      document.querySelectorAll(".data-table-shell").forEach(function(shell) {
        var tableId = shell.dataset.tableId || "dashboard-table";
        shell.querySelectorAll("th").forEach(function(header, index) {
          var saved = localStorage.getItem("table-width:" + tableId + ":" + index);
          if (saved) { header.style.width = saved + "px"; }
          var handle = header.querySelector(".column-resizer");
          if (!handle) { return; }
          handle.addEventListener("pointerdown", function(event) {
            event.preventDefault();
            var startX = event.clientX;
            var startWidth = header.offsetWidth;
            function resize(moveEvent) {
              var nextWidth = Math.max(80, startWidth + moveEvent.clientX - startX);
              header.style.width = nextWidth + "px";
              localStorage.setItem("table-width:" + tableId + ":" + index, String(nextWidth));
            }
            function stop() {
              document.removeEventListener("pointermove", resize);
              document.removeEventListener("pointerup", stop);
            }
            document.addEventListener("pointermove", resize);
            document.addEventListener("pointerup", stop);
          });
        });
      });
    }
    document.addEventListener("DOMContentLoaded", initializeDashboardTables);
  </script>
</body>
</html>
